<!DOCTYPE html>
<html>

<head>

<title>DAJ.GG</title>

<link rel="stylesheet" href="/static/style.css">

<meta name="viewport" content="width=device-width, initial-scale=1">

</head>

<body>

<header class="topbar">

<div class="logo">
DAJ.GG
</div>

</header>

<section class="hero">

<h1>League of Legends Player Stats</h1>

<p>Search any Riot ID and analyze matches instantly</p>

<form action="/search" class="search">

<input
type="text"
name="player"
placeholder="Enter Riot ID (Caps#EUW)"
required>

<button type="submit">
Search
</button>

</form>

</section>

<section class="features">

<div class="feature">

<h3>Match Analysis</h3>
<p>See KDA, items and match history</p>

</div>

<div class="feature">

<h3>AI Coach</h3>
<p>Get automatic improvement tips</p>

</div>

<div class="feature">

<h3>Fast Stats</h3>
<p>Instant stats with optimized API cache</p>

</div>

</section>

<footer>

DAJ.GG – Fan project for League of Legends

</footer>

</body>

</html>
