<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<h2>{{name}}#{{tag}}</h2>
<p>Level {{level}}</p>
<p>Rank: {{rank}}</p>

{% for match in matches %}

<div class="match">

<div class="team">

{% for p in match.blue %}
<div>{{p.name}} {{p.k}}/{{p.d}}/{{p.a}}</div>
{% endfor %}

</div>

<div class="vs">VS</div>

<div class="team">

{% for p in match.red %}
<div>{{p.name}} {{p.k}}/{{p.d}}/{{p.a}}</div>
{% endfor %}

</div>

</div>

<p class="mvp">⭐ MVP : {{match.mvp}}</p>

{% endfor %}

</body>
</html>
