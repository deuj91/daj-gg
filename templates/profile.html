<!DOCTYPE html>
<html>
<head>
<title>{{ name }} - DAJ.GG</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

<h1>{{ name }}</h1>

{% for game in games %}

<div class="match {% if game.win %}win{% else %}lose{% endif %}">

<div class="champion">
<b>{{ game.champion }}</b>
</div>

<div class="kda">
{{ game.kills }}/{{ game.deaths }}/{{ game.assists }}
</div>

<div class="items">

{% for item in game.items %}

{% if item != 0 %}

<img src="https://ddragon.leagueoflegends.com/cdn/13.1.1/img/item/{{item}}.png">

{% endif %}

{% endfor %}

</div>

<details>

<summary>Players</summary>

<div class="players">

{% for p in game.players %}

<div class="player">

{{ p.name }} — {{ p.champion }}

</div>

{% endfor %}

</div>

</details>

</div>

{% endfor %}

</div>

</body>
</html>
