<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>{{ name }}</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
margin:0;
}

.container{
max-width:900px;
margin:auto;
padding:30px;
}

.match{
background:#1e293b;
padding:15px;
margin-top:20px;
border-radius:10px;
}

.win{
border-left:6px solid #22c55e;
}

.lose{
border-left:6px solid #ef4444;
}

.items img{
width:40px;
margin-right:4px;
}

</style>

</head>

<body>

<div class="container">

<h1>{{ name }}</h1>

{% for game in games %}

<div class="match {% if game.win %}win{% else %}lose{% endif %}">

<h3>{{ game.champion }}</h3>

<p>
{{ game.kills }}/{{ game.deaths }}/{{ game.assists }}
</p>

<div class="items">

{% for item in game["items"] %}
{% if item != 0 %}
<img src="https://ddragon.leagueoflegends.com/cdn/13.1.1/img/item/{{ item }}.png">
{% endif %}
{% endfor %}

</div>

</div>

{% endfor %}

</div>

</body>
</html>
