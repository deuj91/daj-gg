<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>{{ name }}</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
margin:0;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
background:#020617;
}

.logo{
font-size:22px;
font-weight:bold;
}

.menu-btn{
font-size:28px;
cursor:pointer;
}

.menu{
display:none;
background:#020617;
padding:20px;
}

.menu a{
display:block;
color:white;
text-decoration:none;
margin:10px 0;
}

/* CONTAINER */

.container{
max-width:1200px;
margin:auto;
padding:30px;
}

/* MATCH CARD */

.match{
background:#1e293b;
padding:25px;
margin-top:30px;
border-radius:12px;
}

/* TEAMS */

.teams{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:20px;
}

.team{
width:42%;
}

/* VS */

.vs{
font-size:40px;
font-weight:bold;
color:#38bdf8;
}

/* PLAYER ROW */

.player{
display:flex;
align-items:center;
justify-content:space-between;
background:#0f172a;
padding:10px;
margin:8px 0;
border-radius:8px;
}

/* PLAYER NAME */

.name{
flex:1;
}

/* KDA */

.kda{
width:90px;
text-align:center;
}

/* RANK */

.rank{
width:90px;
text-align:center;
color:#facc15;
}

/* ITEMS */

.items img{
width:30px;
margin-left:3px;
}

</style>

<script>

function toggleMenu(){
let menu = document.getElementById("menu")

if(menu.style.display === "block"){
menu.style.display = "none"
}else{
menu.style.display = "block"
}

}

</script>

</head>

<body>

<div class="header">

<div class="logo">
LOLGPT
</div>

<div class="menu-btn" onclick="toggleMenu()">
☰
</div>

</div>

<div id="menu" class="menu">

<a href="/">Accueil</a>
<a href="/">Recherche</a>

</div>

<div class="container">

<h1>{{ name }}</h1>

{% for game in games %}

<div class="match">

<h3>{{ game.champion }} — {{ game.kills }}/{{ game.deaths }}/{{ game.assists }}</h3>

<div class="teams">

<!-- TEAM ALLIEE -->

<div class="team">

{% for p in game.players[:5] %}

<div class="player">

<div class="name">
{{ p.name }}
</div>

<div class="rank">
Unranked
</div>

<div class="kda">
-
</div>

<div class="items">
<img src="https://ddragon.leagueoflegends.com/cdn/13.1.1/img/item/1001.png">
</div>

</div>

{% endfor %}

</div>

<div class="vs">
VS
</div>

<!-- TEAM ENNEMIE -->

<div class="team">

{% for p in game.players[5:] %}

<div class="player">

<div class="name">
{{ p.name }}
</div>

<div class="rank">
Unranked
</div>

<div class="kda">
-
</div>

<div class="items">
<img src="https://ddragon.leagueoflegends.com/cdn/13.1.1/img/item/1001.png">
</div>

</div>

{% endfor %}

</div>

</div>

</div>

{% endfor %}

</div>

</body>
</html>
