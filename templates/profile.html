<!DOCTYPE html>
<html>

<head>

<title>{{name}} - DAJ.GG</title>

<link rel="stylesheet" href="/static/style.css">

</head>

<body>

<header>

<a class="logo" href="/">DAJ.GG</a>

</header>

<div class="container">

<h1>{{name}}</h1>

<div class="coach">

<h2>AI Coach</h2>

<ul>
{% for tip in tips %}
<li>{{tip}}</li>
{% endfor %}
</ul>

</div>

<h2>Recent Matches</h2>

{% for game in games %}

<div class="match">

<div class="match-main">

<img
class="champion-img"
src="https://ddragon.leagueoflegends.com/cdn/13.6.1/img/champion/{{game.champion}}.png">

<div class="kda">

{{game.kills}} / {{game.deaths}} / {{game.assists}}

</div>

<div>

{% if game.win %}
<span class="win">WIN</span>
{% else %}
<span class="lose">LOSE</span>
{% endif %}

</div>

<button onclick="toggle({{loop.index}})">
Players
</button>

</div>

<div id="players{{loop.index}}" class="players">

{% for p in game.players %}

<div class="player">

<img
class="champion-small"
src="https://ddragon.leagueoflegends.com/cdn/13.6.1/img/champion/{{p.champion}}.png">

{{p.name}}

</div>

{% endfor %}

</div>

</div>

{% endfor %}

</div>

<script>

function toggle(id){

let el = document.getElementById("players"+id)

if(el.style.display=="block"){
el.style.display="none"
}else{
el.style.display="block"
}

}

</script>

</body>

</html>
