<!DOCTYPE html>
<html>

<head>

<link rel="stylesheet" href="/static/style.css">

</head>

<body class="results">

<div class="profile">

<h2>{{summoner.name}}</h2>

<p>Level {{summoner.summonerLevel}}</p>

</div>

{% for game in games %}

<div class="match {% if game.win %}win{% else %}lose{% endif %}">

<div class="left">

<img class="champ"
src="https://ddragon.leagueoflegends.com/cdn/13.1.1/img/champion/{{game.champ}}.png">

</div>

<div class="stats">

<div class="kda">

{{game.kills}} / {{game.deaths}} / {{game.assists}}

</div>

<div class="mode">

{{game.mode}} • {{game.duration}} min

</div>

</div>

<div class="items">

{% for item in game.items %}

{% if item != 0 %}

<img src="https://ddragon.leagueoflegends.com/cdn/13.1.1/img/item/{{item}}.png">

{% endif %}

{% endfor %}

</div>

</div>

{% endfor %}

</body>
</html>
