<!DOCTYPE html>
<html>

<head>
<title>Results</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="profile">

<h2>Level {{ summoner.summonerLevel }}</h2>

</div>

<div class="games">

{% for game in games %}

<div class="game {% if game.win %}win{% else %}lose{% endif %}">

<div class="champ">
{{ game.champ }}
</div>

<div class="kda">
{{ game.kills }}/{{ game.deaths }}/{{ game.assists }}
</div>

<div class="duration">
{{ game.duration }} min
</div>

<div class="items">

{% for item in game.items_list %}

{% if item != 0 %}

<img src="https://ddragon.leagueoflegends.com/cdn/13.6.1/img/item/{{ item }}.png">

{% endif %}

{% endfor %}

</div>

</div>

{% endfor %}

</div>

</body>
</html>
