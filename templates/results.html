<!DOCTYPE html>
<html>

<head>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="profile">

<h1>{{summoner.name}}</h1>

{% if rank %}

<div class="rank">

<img src="https://raw.communitydragon.org/latest/plugins/rcp-fe-lol-static-assets/global/default/images/ranked-emblem/emblem-{{rank.tier|lower}}.png">

<span>{{rank.tier}} {{rank.rank}}</span>

</div>

{% endif %}

</div>


{% for g in games %}

<div class="match">

<div class="match-header">

<img class="champion"
src="https://ddragon.leagueoflegends.com/cdn/13.1.1/img/champion/{{g.champion}}.png">

<div>

{{g.kills}} / {{g.deaths}} / {{g.assists}}

</div>

</div>

<p class="analysis">{{g.analysis}}</p>


<div class="teams">

<div class="team">

{% for p in g.team1 %}

<div class="player">

<img class="champion-small"
src="https://ddragon.leagueoflegends.com/cdn/13.1.1/img/champion/{{p.champion}}.png">

{{p.name}}

<span>{{p.gold}}g</span>

</div>

{% endfor %}

</div>


<div class="team">

{% for p in g.team2 %}

<div class="player">

<img class="champion-small"
src="https://ddragon.leagueoflegends.com/cdn/13.1.1/img/champion/{{p.champion}}.png">

{{p.name}}

<span>{{p.gold}}g</span>

</div>

{% endfor %}

</div>

</div>

</div>

{% endfor %}

</body>

</html>
